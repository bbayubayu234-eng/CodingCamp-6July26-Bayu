<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense & Budget Visualizer</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">

    <div class="header-top">

        <div>

            <span class="greeting">
                👋 Good Afternoon
            </span>

            <h1>Expense Tracker</h1>

            <p>
                Keep tracking your daily spending
            </p>

            <small id="todayDate"></small>

        </div>

        <button id="themeToggle">

            <i class="fa-solid fa-moon"></i>

        </button>

    </div>

</header>
    



    <!-- BALANCE -->

    <section class="balance-card">

        <span>Total Expenses</span>

        <h2 id="totalBalance">
            Rp0
        </h2>

    </section>



    <!-- FORM -->

    <section class="card">

        <h3>

            <i class="fa-solid fa-plus"></i>

            Add Transaction

        </h3>

        <form id="expenseForm">

            <div class="input-group">

                <label>
                    Item Name
                </label>

                <input
                    type="text"
                    id="itemName"
                    placeholder="Example : Burger">

            </div>

            <div class="input-group">

                <label>
                    Amount
                </label>

                <input
                    type="number"
                    id="amount"
                    placeholder="50000">

            </div>

            <div class="input-group">

                <label>
                    Category
                </label>

                <select id="category">

                    <option value="">
                        Select Category
                    </option>

                    <option value="Food">
                        Food
                    </option>

                    <option value="Transport">
                        Transport
                    </option>

                    <option value="Fun">
                        Fun
                    </option>

                    <option value="Custom">
                        + Custom Category
                    </option>

                </select>

            </div>


            <!-- OPTIONAL CUSTOM CATEGORY -->

            <div
                class="input-group"
                id="customCategoryGroup">

                <label>

                    Custom Category

                </label>

                <input
                    type="text"
                    id="customCategory"
                    placeholder="Shopping">

            </div>



            <button
                type="submit"
                class="add-btn">

                <i class="fa-solid fa-plus"></i>

                Add Transaction

            </button>

        </form>

    </section>





    <!-- SORT -->

    <section class="card">

        <div class="sort-box">

            <h3>

                <i class="fa-solid fa-filter"></i>

                Sort Transactions

            </h3>

            <select id="sortSelect">

                <option value="latest">
                    Latest
                </option>

                <option value="highest">
                    Highest Amount
                </option>

                <option value="lowest">
                    Lowest Amount
                </option>

                <option value="category">
                    Category
                </option>

            </select>

        </div>

    </section>





    <!-- CHART -->

    <section class="card">

        <h3>

            <i class="fa-solid fa-chart-pie"></i>

            Spending Distribution

        </h3>

        <canvas id="expenseChart">

        </canvas>

    </section>





    <!-- TRANSACTIONS -->

    <section class="card">

        <div class="transaction-header">

            <h3>

                <i class="fa-solid fa-clock-rotate-left"></i>

                Recent Transactions

            </h3>

        </div>

        <div
            id="transactionList"
            class="transaction-list">

            <!-- JavaScript -->

        </div>

    </section>



</div>



<!-- Chart JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- JS -->

<script src="script.js"></script>

</body>
</html>
